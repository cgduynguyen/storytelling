openapi: 3.0.3
info:
  title: AI Storyteller for Kids API
  description: |
    REST API for the AI Kids Storyteller application.
    
    ## Authentication
    All endpoints except `/auth/*` require a valid JWT Bearer token.
    
    ## Error Format
    All errors follow the format:
    ```json
    {
      "error": {
        "code": "ERROR_CODE",
        "message": "Human readable message",
        "details": {}
      }
    }
    ```
  version: 1.0.0
  contact:
    name: API Support

servers:
  - url: http://localhost:3000/api/v1
    description: Development
  - url: https://api.storyteller.app/v1
    description: Production

tags:
  - name: Auth
    description: Authentication endpoints
  - name: Stories
    description: Story generation and management
  - name: Library
    description: Saved stories library
  - name: Settings
    description: User and parental settings

paths:
  # ============ AUTH ============
  /auth/register:
    post:
      tags: [Auth]
      summary: Register new account
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Account created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: Email already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/login:
    post:
      tags: [Auth]
      summary: Login to account
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token
      operationId: refreshToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken:
                  type: string
      responses:
        '200':
          description: Token refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout and invalidate tokens
      operationId: logout
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Logged out successfully

  # ============ STORIES ============
  /stories:
    post:
      tags: [Stories]
      summary: Create a new story
      description: |
        Queues a new story for generation. Returns immediately with story ID.
        Poll `/stories/{id}` or use webhooks to get completion status.
      operationId: createStory
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateStoryRequest'
      responses:
        '202':
          description: Story generation queued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Story'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    get:
      tags: [Stories]
      summary: Get story history
      description: Returns all stories generated by the user (including unsaved)
      operationId: getStoryHistory
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/StoryStatus'
      responses:
        '200':
          description: Story list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StoryListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /stories/{storyId}:
    get:
      tags: [Stories]
      summary: Get story details
      operationId: getStory
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/storyId'
      responses:
        '200':
          description: Story details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Story'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags: [Stories]
      summary: Delete a story
      operationId: deleteStory
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/storyId'
      responses:
        '204':
          description: Story deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /stories/{storyId}/audio:
    get:
      tags: [Stories]
      summary: Stream story audio
      description: Returns the pre-generated MP3 audio for the story
      operationId: getStoryAudio
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/storyId'
      responses:
        '200':
          description: Audio stream
          content:
            audio/mpeg:
              schema:
                type: string
                format: binary
        '404':
          $ref: '#/components/responses/NotFound'

  /stories/{storyId}/segments:
    get:
      tags: [Stories]
      summary: Get interactive story segments
      description: Returns all segments for an interactive story
      operationId: getStorySegments
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/storyId'
      responses:
        '200':
          description: Story segments
          content:
            application/json:
              schema:
                type: object
                properties:
                  segments:
                    type: array
                    items:
                      $ref: '#/components/schemas/StorySegment'
        '404':
          $ref: '#/components/responses/NotFound'

  /stories/{storyId}/segments/{segmentId}/audio:
    get:
      tags: [Stories]
      summary: Stream segment audio
      operationId: getSegmentAudio
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/storyId'
        - name: segmentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Audio stream
          content:
            audio/mpeg:
              schema:
                type: string
                format: binary
        '404':
          $ref: '#/components/responses/NotFound'

  # ============ LIBRARY ============
  /library:
    get:
      tags: [Library]
      summary: Get saved stories
      operationId: getLibrary
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: Saved stories
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StoryListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /library/{storyId}:
    post:
      tags: [Library]
      summary: Save story to library
      operationId: saveToLibrary
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/storyId'
      responses:
        '200':
          description: Story saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Story'
        '400':
          description: Library full (50 stories max)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags: [Library]
      summary: Remove story from library
      operationId: removeFromLibrary
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/storyId'
      responses:
        '200':
          description: Story removed from library
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Story'
        '404':
          $ref: '#/components/responses/NotFound'

  # ============ SETTINGS ============
  /settings/profile:
    get:
      tags: [Settings]
      summary: Get user profile
      operationId: getProfile
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '401':
          $ref: '#/components/responses/Unauthorized'

    patch:
      tags: [Settings]
      summary: Update user profile
      operationId: updateProfile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
      responses:
        '200':
          description: Profile updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '400':
          $ref: '#/components/responses/BadRequest'

  /settings/parental:
    get:
      tags: [Settings]
      summary: Get parental settings
      description: Requires parental PIN verification
      operationId: getParentalSettings
      security:
        - bearerAuth: []
      parameters:
        - name: X-Parental-Pin
          in: header
          required: true
          schema:
            type: string
            pattern: '^\d{4}$'
      responses:
        '200':
          description: Parental settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ParentalSettings'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Invalid PIN
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    patch:
      tags: [Settings]
      summary: Update parental settings
      operationId: updateParentalSettings
      security:
        - bearerAuth: []
      parameters:
        - name: X-Parental-Pin
          in: header
          required: true
          schema:
            type: string
            pattern: '^\d{4}$'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateParentalSettingsRequest'
      responses:
        '200':
          description: Settings updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ParentalSettings'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          description: Invalid PIN

  /settings/parental/pin:
    put:
      tags: [Settings]
      summary: Change parental PIN
      operationId: changeParentalPin
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [currentPin, newPin]
              properties:
                currentPin:
                  type: string
                  pattern: '^\d{4}$'
                newPin:
                  type: string
                  pattern: '^\d{4}$'
      responses:
        '204':
          description: PIN changed
        '403':
          description: Invalid current PIN

  /settings/parental/verify:
    post:
      tags: [Settings]
      summary: Verify parental PIN
      operationId: verifyParentalPin
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [pin]
              properties:
                pin:
                  type: string
                  pattern: '^\d{4}$'
      responses:
        '200':
          description: PIN valid
          content:
            application/json:
              schema:
                type: object
                properties:
                  valid:
                    type: boolean
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ============ VOICES ============
  /voices:
    get:
      tags: [Settings]
      summary: Get available TTS voices
      operationId: getVoices
      security:
        - bearerAuth: []
      parameters:
        - name: locale
          in: query
          schema:
            type: string
            default: en-US
      responses:
        '200':
          description: Available voices
          content:
            application/json:
              schema:
                type: object
                properties:
                  voices:
                    type: array
                    items:
                      $ref: '#/components/schemas/Voice'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    storyId:
      name: storyId
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Missing or invalid authentication
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    # ---- Enums ----
    AgeBand:
      type: string
      enum: [AGE_3_5, AGE_6_8, AGE_9_10]
      description: |
        Age bands:
        - AGE_3_5: Ages 3-5 (simple vocabulary, basic themes)
        - AGE_6_8: Ages 6-8 (moderate vocabulary, adventure themes)
        - AGE_9_10: Ages 9-10 (rich vocabulary, complex narratives)

    StoryTheme:
      type: string
      enum: [ADVENTURE, ANIMALS, FANTASY, FRIENDSHIP, SPACE, UNDERWATER, NATURE, RANDOM]

    StoryLength:
      type: string
      enum: [SHORT, MEDIUM, LONG]
      description: |
        - SHORT: ~300 words, ~2 min read
        - MEDIUM: ~600 words, ~5 min read
        - LONG: ~1000 words, ~10 min read

    StoryStatus:
      type: string
      enum: [PENDING, GENERATING, AUDIO_PENDING, COMPLETED, FAILED]

    # ---- Auth ----
    RegisterRequest:
      type: object
      required: [email, password, name, ageBand, pin]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        name:
          type: string
          minLength: 1
          maxLength: 50
        ageBand:
          $ref: '#/components/schemas/AgeBand'
        pin:
          type: string
          pattern: '^\d{4}$'
          description: 4-digit parental PIN

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    AuthResponse:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        expiresIn:
          type: integer
          description: Access token expiry in seconds
        user:
          $ref: '#/components/schemas/UserProfile'

    # ---- Story ----
    CreateStoryRequest:
      type: object
      required: [theme, length]
      properties:
        theme:
          $ref: '#/components/schemas/StoryTheme'
        length:
          $ref: '#/components/schemas/StoryLength'
        mainCharacter:
          type: string
          minLength: 1
          maxLength: 30
          pattern: '^[a-zA-Z\s]+$'
          description: Optional custom character name
        isInteractive:
          type: boolean
          default: false
          description: Enable choose-your-adventure mode

    Story:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        theme:
          $ref: '#/components/schemas/StoryTheme'
        length:
          $ref: '#/components/schemas/StoryLength'
        ageBand:
          $ref: '#/components/schemas/AgeBand'
        isInteractive:
          type: boolean
        mainCharacter:
          type: string
          nullable: true
        status:
          $ref: '#/components/schemas/StoryStatus'
        content:
          type: string
          nullable: true
          description: Full story text (null for interactive stories)
        audioUrl:
          type: string
          format: uri
          nullable: true
        wordBoundaries:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/WordBoundary'
        savedToLibrary:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    StoryListResponse:
      type: object
      properties:
        stories:
          type: array
          items:
            $ref: '#/components/schemas/Story'
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer

    StorySegment:
      type: object
      properties:
        id:
          type: string
          format: uuid
        content:
          type: string
        audioUrl:
          type: string
          format: uri
          nullable: true
        wordBoundaries:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/WordBoundary'
        order:
          type: integer
        isEnding:
          type: boolean
        choices:
          type: array
          items:
            $ref: '#/components/schemas/Choice'

    Choice:
      type: object
      properties:
        id:
          type: string
          format: uuid
        text:
          type: string
        nextSegmentId:
          type: string
          format: uuid
        order:
          type: integer

    WordBoundary:
      type: object
      properties:
        text:
          type: string
        offset:
          type: integer
          description: Character offset in content
        duration:
          type: integer
          description: Duration in milliseconds
        audioOffset:
          type: integer
          description: Milliseconds into audio

    # ---- Settings ----
    UserProfile:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        name:
          type: string
        ageBand:
          $ref: '#/components/schemas/AgeBand'
        createdAt:
          type: string
          format: date-time

    UpdateProfileRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 50

    ParentalSettings:
      type: object
      properties:
        ageBand:
          $ref: '#/components/schemas/AgeBand'
        excludedThemes:
          type: array
          items:
            $ref: '#/components/schemas/StoryTheme'

    UpdateParentalSettingsRequest:
      type: object
      properties:
        ageBand:
          $ref: '#/components/schemas/AgeBand'
        excludedThemes:
          type: array
          items:
            $ref: '#/components/schemas/StoryTheme'

    Voice:
      type: object
      properties:
        id:
          type: string
          description: Voice identifier (e.g., en-US-AnaNeural)
        name:
          type: string
          description: Display name
        locale:
          type: string
        gender:
          type: string
          enum: [Male, Female]
        isChildVoice:
          type: boolean

    # ---- Errors ----
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              description: Machine-readable error code
            message:
              type: string
              description: Human-readable error message
            details:
              type: object
              additionalProperties: true
